<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VC Deal Flow Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────────────────────────────── */
    :root {
      --bg:          #080810;
      --surface:     #0e0e1a;
      --elevated:    #13131f;
      --border:      rgba(255,255,255,0.06);
      --border-hi:   rgba(255,255,255,0.12);
      --text:        #e2e8f0;
      --text-2:      #94a3b8;
      --text-3:      #475569;
      --accent:      #6366f1;
      --accent-glow: rgba(99,102,241,0.15);
      --accent-dim:  rgba(99,102,241,0.08);
      --green:       #10b981;
      --cyan:        #06b6d4;
      --violet:      #8b5cf6;
      --amber:       #f59e0b;
      --red:         #ef4444;
      --radius:    10px;
      --radius-sm: 6px;
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Animations ────────────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--elevated) 25%, var(--border-hi) 50%, var(--elevated) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    .fade-up { animation: fadeUp 0.35s ease both; }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(180deg, #0d1117 0%, #111827 100%);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 1.5rem;
      max-width: 1320px; margin: 0 auto;
    }
    .brand { display: flex; align-items: center; gap: 0.875rem; }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(145deg, #1a1f35, #252a45);
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(99,102,241,0.22), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .brand-name {
      font-size: 1.0625rem; font-weight: 800; letter-spacing: -0.03em;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .brand-name::before {
      content: ''; display: inline-block; width: 3px; height: 1em;
      background: var(--accent); border-radius: 2px; flex-shrink: 0;
    }
    .brand-sub   { font-size: 0.625rem; color: #64748b; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 0.125rem; }
    .claude-badge {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.5625rem; font-family: 'JetBrains Mono', monospace;
      color: #a8856e; letter-spacing: 0.04em;
      padding: 0.25rem 0.5625rem;
      border: 1px solid rgba(204,120,92,0.22);
      border-radius: var(--radius-sm);
      background: rgba(204,120,92,0.06);
      white-space: nowrap;
    }
    .claude-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #cc785c; flex-shrink: 0; }
    .header-right { display: flex; align-items: center; gap: 0.875rem; }
    .live-indicator { display: flex; align-items: center; gap: 0.4rem; font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse-dot 2s ease infinite; }
    .btn-group { display: flex; align-items: center; gap: 0.375rem; }
    .refresh-btn {
      display: flex; align-items: center; gap: 0.375rem;
      background: var(--accent-dim); border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc; font-size: 0.75rem; font-weight: 500;
      font-family: 'Inter', sans-serif; padding: 0.375rem 0.75rem;
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.5); color: #c7d2fe; }
    .refresh-btn.loading .refresh-icon { animation: spin 0.8s linear infinite; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-all-btn {
      background: none; border: 1px solid var(--border); color: var(--text-3);
      font-size: 0.6875rem; font-weight: 500; font-family: 'Inter', sans-serif;
      padding: 0.375rem 0.625rem; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s;
    }
    .refresh-all-btn:hover { border-color: var(--border-hi); color: var(--text-2); }
    .refresh-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Outer Firm Tabs ─────────────────────────────────────────────── */
    .firm-tabs { display: flex; gap: 0; padding: 0 1.5rem; max-width: 1320px; margin: 0 auto; border-top: 1px solid var(--border); }
    .firm-tab {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5625rem 1rem; font-size: 0.8125rem; font-weight: 500;
      color: var(--text-2); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      user-select: none; position: relative; top: 1px;
    }
    .firm-tab:hover { color: var(--text); }
    .firm-tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .firm-tab .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .firm-tab .tab-dot.live { animation: pulse-dot 2s ease infinite; }
    .firm-tab .soon-badge { font-size: 0.5rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(255,255,255,0.06); color: var(--text-3); padding: 0.125rem 0.375rem; border-radius: 3px; }

    /* ── Inner Tabs ──────────────────────────────────────────────────── */
    .inner-tabs-bar { border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
    .inner-tabs-bar.hidden { display: none; }
    .inner-tabs { display: flex; gap: 0; padding: 0 1.5rem; max-width: 1320px; margin: 0 auto; overflow-x: auto; scrollbar-width: none; }
    .inner-tabs::-webkit-scrollbar { display: none; }
    .inner-tab {
      display: flex; align-items: center; gap: 0.375rem;
      padding: 0.4rem 0.75rem; font-size: 0.7188rem; font-weight: 500;
      color: var(--text-3); cursor: pointer;
      border-bottom: 1.5px solid transparent; transition: all 0.15s;
      white-space: nowrap; user-select: none;
      position: relative; top: 1px;
    }
    .inner-tab:hover { color: var(--text-2); }
    .inner-tab.active { color: var(--text-2); border-bottom-color: rgba(99,102,241,0.6); }
    .inner-tab .loaded-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); opacity: 0; transition: opacity 0.3s; flex-shrink: 0; }
    .inner-tab.loaded .loaded-dot { opacity: 1; }

    /* ── Main / Panels ──────────────────────────────────────────────── */
    main { padding: 2rem 1.5rem 5rem; max-width: 1320px; margin: 0 auto; }
    .error-banner { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); padding: 0.625rem 1rem; font-size: 0.8125rem; color: #fca5a5; margin-bottom: 1.25rem; display: none; align-items: center; gap: 0.5rem; }
    .error-banner.visible { display: flex; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp 0.3s ease both; }

    /* ── Panel Header ───────────────────────────────────────────────── */
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .panel-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); }
    .panel-meta { display: flex; align-items: center; gap: 0.625rem; font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .tab-refresh-btn { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 0.2rem 0.375rem; border-radius: 4px; display: flex; align-items: center; gap: 0.25rem; font-size: 0.625rem; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; }
    .tab-refresh-btn:hover { color: var(--text-2); background: rgba(255,255,255,0.05); }
    .tab-refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

    /* ── Tab Spinner ────────────────────────────────────────────────── */
    .tab-spinner { display: flex; align-items: center; justify-content: center; padding: 5rem 0; flex-direction: column; gap: 1rem; }
    .spinner-ring { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
    .spinner-label { font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; color: var(--text-3); }

    /* ── Coming Soon ─────────────────────────────────────────────────── */
    .coming-soon-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4rem 2rem; text-align: center; animation: fadeUp 0.4s ease both; }
    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
    .coming-soon-title { font-size: 1.125rem; font-weight: 600; color: var(--text-2); margin-bottom: 0.5rem; }
    .coming-soon-sub { font-size: 0.875rem; color: var(--text-3); }

    /* ── Overview: News Feed ─────────────────────────────────────────── */
    .news-feed { display: flex; flex-direction: column; gap: 0.625rem; }
    .news-card {
      display: block; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.375rem;
      transition: border-color 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }
    .news-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .news-card[data-cat="Deal"]::before          { background: #059669; }
    .news-card[data-cat="Industry News"]::before  { background: #0284c7; }
    .news-card[data-cat="Trend"]::before          { background: #7c3aed; }
    .news-card[data-cat="Opinion"]::before        { background: #b45309; }
    .news-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .news-card-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4375rem; flex-wrap: wrap; }
    .news-cat-tag { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.125rem 0.4rem; border-radius: 3px; }
    .news-cat-tag.Deal          { background: rgba(5,150,105,0.15);  color: #34d399; }
    .news-cat-tag.Industry-News { background: rgba(2,132,199,0.15);  color: #38bdf8; }
    .news-cat-tag.Trend         { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .news-cat-tag.Opinion       { background: rgba(180,83,9,0.15);   color: #fbbf24; }
    .news-source { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .news-sep { color: var(--text-3); font-size: 0.5rem; }
    .news-date { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .news-card-title { font-size: 0.9375rem; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 0.375rem; }
    .news-card-summary { font-size: 0.8125rem; color: var(--text-2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-read { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.625rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; margin-top: 0.5rem; opacity: 0; transition: opacity 0.15s; }
    .news-card:hover .news-read { opacity: 1; }

    /* ── Investments ─────────────────────────────────────────────────── */
    .investments-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .inv-card {
      display: block; text-decoration: none; color: inherit;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.375rem 1rem 1.5rem;
      position: relative; overflow: hidden;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .inv-card:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); transform: translateY(-1px); }
    .inv-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #059669; }
    .inv-card.scraped::before { background: #0284c7; opacity: 0.6; }
    .inv-top { display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.4375rem; flex-wrap: wrap; }
    .inv-company { font-size: 1rem; font-weight: 700; color: var(--text); }
    .inv-round { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.1875rem 0.5rem; border-radius: 3px; background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .inv-amount { font-size: 0.8125rem; font-weight: 700; color: var(--green); font-family: 'JetBrains Mono', monospace; }
    .inv-sector { font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.1875rem 0.4375rem; border-radius: 3px; background: rgba(6,182,212,0.1); color: #67e8f9; }
    .inv-reason { font-size: 0.8125rem; color: var(--text-2); line-height: 1.55; margin-bottom: 0.5rem; }
    .inv-footer { display: flex; align-items: center; gap: 0.625rem; flex-wrap: wrap; }
    .inv-date { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .inv-src-label { font-size: 0.5rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Trends: Clickable Cards ─────────────────────────────────────── */
    .trends-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; align-items: start; }
    @media (max-width: 900px) { .trends-layout { grid-template-columns: 1fr; } }
    .trends-col-header { display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.875rem; }
    .trends-col-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; flex-shrink: 0; }
    .trends-col-title { font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-2); }
    .trends-col-items { display: flex; flex-direction: column; gap: 0.5rem; }
    .trend-card {
      display: block; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.875rem 1rem;
      transition: border-color 0.2s, transform 0.15s, background 0.15s;
      cursor: pointer;
    }
    .trend-card:hover { border-color: var(--border-hi); transform: translateY(-1px); background: rgba(255,255,255,0.015); }
    .trend-card-text { font-size: 0.875rem; color: var(--text); font-weight: 500; line-height: 1.4; margin-bottom: 0.375rem; }
    .trend-card-meta { display: flex; align-items: center; gap: 0.4375rem; flex-wrap: wrap; }
    .trend-card-source { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .trend-card-date { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .trend-card-no-link { background: var(--elevated); border-color: transparent; cursor: default; }
    .trend-card-no-link:hover { transform: none; border-color: transparent; background: var(--elevated); }
    .trend-card-no-link .trend-card-text { color: var(--text-2); font-weight: 400; }
    .trend-card-summary { font-size: 0.75rem; color: var(--text-3); line-height: 1.45; margin-bottom: 0.375rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .trend-read { font-size: 0.5625rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; margin-top: 0.5rem; opacity: 0; transition: opacity 0.15s; }
    .trend-card:hover .trend-read { opacity: 1; }

    /* ── Partner Pulse ───────────────────────────────────────────────── */
    .x-banner {
      background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(99,102,241,0.06) 100%);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius); padding: 1.125rem 1.375rem;
      margin-bottom: 1.75rem;
      display: flex; align-items: flex-start; gap: 0.875rem;
    }
    .x-banner-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 0.0625rem; }
    .x-banner-text {}
    .x-banner-title { font-size: 0.875rem; font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    .x-banner-sub { font-size: 0.8125rem; color: var(--text-2); line-height: 1.55; }
    .x-banner-handles { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.625rem; }
    .x-handle { font-size: 0.6875rem; font-weight: 500; font-family: 'JetBrains Mono', monospace; color: #a5b4fc; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); padding: 0.1875rem 0.5rem; border-radius: 3px; }
    .partners-section-label { font-size: 0.625rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .partners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .partner-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; transition: border-color 0.2s; }
    .partner-card:hover { border-color: var(--border-hi); }
    .partner-name { font-size: 0.9375rem; font-weight: 700; color: var(--text); margin-bottom: 0.1875rem; }
    .partner-role { font-size: 0.6875rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; margin-bottom: 0.875rem; }
    .partner-topics { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-bottom: 0.75rem; }
    .topic-tag { font-size: 0.6875rem; font-weight: 500; padding: 0.1875rem 0.5rem; border-radius: 3px; background: var(--elevated); color: var(--text-2); border: 1px solid var(--border); }
    .partner-footer { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .partner-count { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .partner-src-links { display: flex; flex-wrap: wrap; gap: 0.375rem; }

    /* ── Portfolio News ──────────────────────────────────────────────── */
    .portfolio-counter { display: flex; align-items: center; gap: 0.5rem; font-size: 0.6875rem; font-family: 'JetBrains Mono', monospace; color: var(--text-3); margin-bottom: 1.25rem; }
    .portfolio-list { display: flex; flex-direction: column; gap: 0.625rem; }
    .portfolio-news-card {
      display: block; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.375rem;
      display: grid; grid-template-columns: auto 1fr; gap: 1rem; align-items: start;
      transition: border-color 0.2s, transform 0.15s;
    }
    .portfolio-news-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .portfolio-company-badge {
      display: flex; flex-direction: column; align-items: flex-start;
      min-width: 110px; max-width: 130px;
      padding-top: 0.125rem;
    }
    .portfolio-co-name { font-size: 0.875rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 0.25rem; }
    .portfolio-co-sector { font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.125rem 0.4375rem; border-radius: 3px; background: rgba(99,102,241,0.1); color: #a5b4fc; white-space: nowrap; }
    .portfolio-news-type { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin-top: 0.375rem; }
    .portfolio-right {}
    .portfolio-headline { font-size: 0.875rem; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 0.375rem; }
    .portfolio-summary { font-size: 0.8125rem; color: var(--text-2); line-height: 1.5; margin-bottom: 0.5rem; }
    .portfolio-item-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .portfolio-source { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .portfolio-date { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

    /* ── About a16z ──────────────────────────────────────────────────── */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 800px) { .about-grid { grid-template-columns: 1fr; } }

    .about-list li::before { content: '—'; color: var(--text-3); flex-shrink: 0; }
    .about-kv { display: flex; flex-direction: column; gap: 0.625rem; }
    .about-kv-row { display: flex; gap: 0.75rem; font-size: 0.875rem; }

    .about-kv-value { color: var(--text-2); line-height: 1.5; }
    .partner-name-chip { display: inline-block; font-size: 0.75rem; font-weight: 500; background: var(--elevated); border: 1px solid var(--border); padding: 0.25rem 0.625rem; border-radius: var(--radius-sm); color: var(--text-2); margin: 0.1875rem; }

    /* ── Shared ──────────────────────────────────────────────────────── */
    .src-link { font-size: 0.5625rem; font-family: 'JetBrains Mono', monospace; color: var(--text-3); background: var(--elevated); border: 1px solid var(--border); padding: 0.125rem 0.4rem; border-radius: 3px; transition: all 0.15s; }
    .src-link:hover { color: var(--text-2); border-color: var(--border-hi); }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-3); font-size: 0.875rem; }

    /* ── Partner Pulse: Tweet Feed ──────────────────────────────────── */
    .tweet-insights-card {
      background: var(--surface); border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius); padding: 0.5rem 0.75rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(99,102,241,0.03) 100%);
    }
    .tweet-insights-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.375rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);

    .tweet-insights-title { font-size: 0.5625rem; font-weight: 700; color: var(--text); }
    .tweet-insights-title::before { content: '◆'; color: var(--accent); margin-right: 0.35rem; font-size: 0.4375rem; }
    .tweet-insights-badge { font-size: 0.4375rem; font-family: 'JetBrains Mono', monospace; color: var(--text-3); letter-spacing: 0.06em; }
    .tweet-insights-subtitle { font-size: 0.5rem; color: var(--text-3); margin-top: 0.15rem; }

    }
    @media (max-width: 900px) { .tweet-insights-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 550px) { .tweet-insights-grid { grid-template-columns: 1fr; } }
    .insights-col-title { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.2rem; display: flex; align-items: center; gap: 0.25rem; }
    .insights-col-list { list-style: none; display: flex; flex-direction: column; gap: 0.1rem; }
    .insights-col-list li { display: flex; align-items: flex-start; gap: 0.3rem; font-size: 0.625rem; color: var(--text-2); line-height: 1.3; }
    .ins-bullet { width: 3px; height: 3px; border-radius: 50%; flex-shrink: 0; margin-top: 0.4rem; }

    .tweet-feed { display: flex; flex-direction: column; gap: 2rem; }
    .tweet-author-section {}
    .tweet-author-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.875rem;
    }
    .handle-badge {
      font-size: 0.75rem; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      padding: 0.25rem 0.75rem; border-radius: 999px; letter-spacing: 0.01em;
    }
    .tweet-count-label { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .tweet-cards { display: flex; flex-direction: column; gap: 0.625rem; }
    .tweet-card {
      display: block; text-decoration: none;
      background: var(--surface); border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius); padding: 1.125rem 1.375rem;
      transition: border-color 0.2s, transform 0.15s;
    }
    .tweet-card:hover { border-color: rgba(255,255,255,0.22); transform: translateY(-1px); }
    .tweet-text {
      font-size: 0.9rem; color: var(--text); line-height: 1.6;
      margin-bottom: 0.875rem; white-space: pre-wrap; word-break: break-word;
    }
    .tweet-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .tweet-stats { display: flex; align-items: center; gap: 1rem; }
    .tweet-stat {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.6875rem; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
    }
    .tweet-stat svg { opacity: 0.6; }
    .tweet-date { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .tweet-attribution {
      margin-top: 2rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.5625rem; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
    }
    .apify-missing-config {
      background: var(--surface); border: 1px solid rgba(245,158,11,0.25);
      border-radius: var(--radius); padding: 2rem; text-align: center;
    }
    .apify-missing-config-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.6; }
    .apify-missing-config-title { font-size: 1rem; font-weight: 600; color: var(--text-2); margin-bottom: 0.5rem; }
    .apify-missing-config-sub { font-size: 0.8125rem; color: var(--text-3); line-height: 1.6; }
    .apify-key-example { display: inline-block; background: var(--elevated); border: 1px solid var(--border); border-radius: 4px; padding: 0.1875rem 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #fbbf24; margin: 0.25rem 0; }

    /* ── Overview: Command Center ───────────────────────────────────── */
    .quick-links-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.375rem; margin-bottom: 1.75rem; }
    .quick-link-sep { width: 1px; height: 16px; background: var(--border); margin: 0 0.25rem; flex-shrink: 0; }
    .quick-link-btn { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.6875rem; font-weight: 500; font-family: 'JetBrains Mono', monospace; padding: 0.25rem 0.625rem; border-radius: 999px; border: 1px solid; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
    .quick-link-btn.x-btn   { color: #e2e8f0; background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
    .quick-link-btn.x-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.22); }
    .quick-link-btn.li-btn  { color: #60a5fa; background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.2); }
    .quick-link-btn.li-btn:hover { background: rgba(59,130,246,0.13); border-color: rgba(59,130,246,0.4); }
    .quick-link-btn.web-btn { color: var(--accent); background: var(--accent-dim); border-color: rgba(99,102,241,0.25); }
    .quick-link-btn.web-btn:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); }

    .overview-section { margin-bottom: 1.75rem; }
    .overview-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .overview-section-title { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }

    .news-strip { display: flex; flex-direction: column; }
    .news-strip-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.4375rem 0.625rem; border-radius: var(--radius-sm); text-decoration: none; transition: background 0.15s; overflow: hidden; }
    .news-strip-row:hover { background: rgba(255,255,255,0.03); }
    .news-strip-date { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; white-space: nowrap; min-width: 82px; }
    .news-strip-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-hi); flex-shrink: 0; }
    .news-strip-source { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; white-space: nowrap; max-width: 130px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .news-strip-title { font-size: 0.8125rem; color: var(--text-2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4; }
    .news-strip-row:hover .news-strip-title { color: var(--text); }

    .signals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .signals-sub-label { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.5rem; }
    .signal-tags { display: flex; flex-wrap: wrap; gap: 0.375rem; }
    .signal-tag { font-size: 0.6875rem; padding: 0.25rem 0.625rem; border-radius: 3px; border: 1px solid; }
    .signal-tag.theme  { background: rgba(99,102,241,0.08); color: #a5b4fc; border-color: rgba(99,102,241,0.2); }
    .signal-tag.sector { background: rgba(6,182,212,0.07);  color: #67e8f9; border-color: rgba(6,182,212,0.18); }

    .overview-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; }
    @media (max-width: 800px) { .overview-grid-3 { grid-template-columns: 1fr; } }

    .overview-with-sidebar { display: grid; grid-template-columns: 1fr 25%; gap: 1.5rem; align-items: start; }
    @media (max-width: 960px) { .overview-with-sidebar { grid-template-columns: 1fr; } }

    .overview-x-sidebar {
      position: sticky; top: 1rem;
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.875rem;
    }
    .sidebar-x-header {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .sidebar-x-logo { color: var(--text); flex-shrink: 0; }
    .sidebar-x-title { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); flex: 1; }
    .sidebar-tweet-card {
      display: block; padding: 0.5625rem 0.625rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface); text-decoration: none;
      margin-bottom: 0.5rem; transition: border-color 0.15s, background 0.15s;
    }
    .sidebar-tweet-card:last-of-type { margin-bottom: 0; }
    .sidebar-tweet-card:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.03); }
    .sidebar-tweet-handle { margin-bottom: 0.3125rem; }
    .sidebar-tweet-text {
      font-size: 0.6875rem; color: var(--text-2); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 0.3125rem;
    }
    .sidebar-tweet-date { font-size: 0.5rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .sidebar-view-all {
      display: block; width: 100%; text-align: center;
      padding: 0.5rem 0 0; margin-top: 0.625rem;
      border: none; border-top: 1px solid var(--border); background: none;
      font-size: 0.625rem; color: var(--accent); cursor: pointer;
      font-family: inherit; letter-spacing: 0.04em; transition: color 0.15s;
    }
    .sidebar-view-all:hover { color: var(--text); }
    .sidebar-empty { font-size: 0.75rem; color: var(--text-3); padding: 0.5rem; text-align: center; }

    .deal-compact { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid #059669; border-radius: var(--radius); padding: 0.875rem 1rem; transition: border-color 0.15s; }
    .deal-compact:hover { border-color: var(--border-hi); }
    .deal-compact-company { font-size: 0.9375rem; font-weight: 700; color: var(--text); margin-bottom: 0.3125rem; }
    .deal-compact-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.375rem; }
    .deal-compact-round  { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.125rem 0.4rem; border-radius: 3px; background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .deal-compact-amount { font-size: 0.75rem; font-weight: 700; color: var(--green); font-family: 'JetBrains Mono', monospace; }
    .deal-compact-date   { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

    .portfolio-compact { display: flex; gap: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; text-decoration: none; transition: border-color 0.15s, transform 0.15s; }
    .portfolio-compact:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .portfolio-compact-co { font-size: 0.625rem; font-weight: 700; color: #a5b4fc; min-width: 55px; padding-top: 0.125rem; line-height: 1.3; }
    .portfolio-compact-headline { font-size: 0.8rem; color: var(--text-2); line-height: 1.4; margin-bottom: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .portfolio-compact-date { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

    .trend-compact { display: flex; flex-direction: column; gap: 0.3rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.875rem 1rem; text-decoration: none; transition: border-color 0.2s, transform 0.15s; }
    .trend-compact:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .trend-compact-text { font-size: 0.875rem; font-weight: 500; color: var(--text); line-height: 1.4; }
    .trend-compact-meta { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .trend-compact-arrow { font-size: 0.5625rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; opacity: 0; transition: opacity 0.15s; }
    .trend-compact:hover .trend-compact-arrow { opacity: 1; }

    /* ── X Activity: 3-Column (a16z) ────────────────────────────────── */
    .x-three-cols { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; margin-bottom: 2rem; }
    @media (max-width: 900px) { .x-three-cols { grid-template-columns: 1fr; } }
    .x-col-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 1rem; }
    .x-col-avatar { width: 2rem; height: 2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 700; flex-shrink: 0; }
    .x-col-meta { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
    .x-col-name-row { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .x-col-name { font-size: 0.75rem; font-weight: 500; color: var(--text-2); }
    .x-col-role { font-size: 0.5625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
    .x-more-section { margin-top: 2rem; }
    .x-more-label { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.875rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .x-more-cols { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; }
    @media (max-width: 900px) { .x-more-cols { grid-template-columns: 1fr; } }
    .tweet-no-recent { padding: 1rem; font-size: 0.8125rem; color: var(--text-3); text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }

    /* ── X Activity Sub-tabs ────────────────────────────────────────── */
    .x-subtab-bar { display: flex; gap: 0.25rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .x-subtab { background: none; border: none; cursor: pointer; font-size: 0.6875rem; font-weight: 600; color: var(--text-3); padding: 0.4rem 0.75rem 0.6rem; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; letter-spacing: 0.03em; }
    .x-subtab:hover { color: var(--text-2); }
    .x-subtab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .x-subtab-panel.hidden { display: none; }
    .x-portfolio-cols { display: grid; grid-template-columns: repeat(5,1fr); gap: 1rem; margin-bottom: 2rem; }
    @media (max-width: 1200px) { .x-portfolio-cols { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 700px)  { .x-portfolio-cols { grid-template-columns: 1fr; } }
    .x-portfolio-loading { padding: 3rem; text-align: center; color: var(--text-3); font-size: 0.8125rem; }

    /* ── Footer ─────────────────────────────────────────────────────── */
    footer { border-top: 1px solid var(--border); padding: 1.25rem 1.5rem; max-width: 1320px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .footer-left  { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .footer-tracking { font-size: 0.625rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .footer-tracking .live { color: var(--green); }
    .footer-tracking .soon { color: var(--text-3); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="17" viewBox="0 0 28 24" fill="none">
          <polyline points="2,20 7,13 13,16 20,6 26,9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="6" r="3" fill="#818cf8"/>
          <line x1="2" y1="22" x2="26" y2="22" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">VC Intelligence Dashboard</div>
        <div class="brand-sub">Where deal flow meets AI</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-indicator">
        <div class="live-dot"></div>

      </div>

        <div class="claude-badge-dot"></div>

      </div>
      <div class="btn-group">

          <svg class="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>

      </div>

  </div>
  <div class="firm-tabs" id="firmTabs"></div>
  <div class="inner-tabs-bar hidden" id="innerTabsBar">

  </div>

<main>
  <div class="error-banner" id="errorBanner">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

  <div class="tab-panel" id="panel-overview"></div>

  <div class="tab-panel" id="panel-trends"></div>
  <div class="tab-panel" id="panel-investments"></div>
  <div class="tab-panel" id="panel-portfolio"></div>
  <div class="tab-panel" id="panel-about"></div>
</main>

<footer>
  <div class="footer-left">VC Deal Flow Tracker · v2.0 · Built by Zach Spanke with Claude Code</div>
  <div class="footer-tracking">
    Tracking:
    <span class="live">a16z (live)</span> ·
    <span class="live">Sequoia (live)</span> ·
    <span class="live">Y Combinator (live)</span> ·
    Powered by Claude AI · Data sourced from public feeds and X API
  </div>
</footer>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────

const INNER_TABS = [
  { id: 'overview',    label: 'Overview',            endpoint: '/api/overview'             },
  { id: 'news',        label: 'Firm News',           endpoint: '/api/feed'                 },
  { id: 'partners',    label: 'X Activity',          endpoint: '/api/partners/insights'    },
  { id: 'trends',      label: 'Industry Trends',     endpoint: '/api/insights/trends'      },
  { id: 'investments', label: 'Recent Investments',  endpoint: '/api/insights/investments' },
  { id: 'portfolio',   label: 'Portfolio News',      endpoint: '/api/portfolio'            },
  { id: 'about',       label: 'About',               endpoint: null                        }
];

// ── Quick Link Data ────────────────────────────────────────────────────────────
const FIRM_QUICK_LINKS = {
  a16z: {
    x: [
      { handle: 'a16z',      url: 'https://x.com/a16z' },
      { handle: 'pmarca',    url: 'https://x.com/pmarca' },

// ── Date Helpers ───────────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return null;
  try {
    const d = new Date(str);
    if (isNaN(d) || d.getFullYear() < 2000) return null;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return null; }
}

function formatAge(ts) {
  if (!ts) return null;
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  return hrs < 24 ? `${hrs}h ago` : `${Math.floor(hrs/24)}d ago`;
}

function nowStr() { return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }); }

// ── Misc Helpers ───────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setError(msg) {
  const b = document.getElementById('errorBanner');
  document.getElementById('errorMsg').textContent = msg || '';
  b.classList.toggle('visible', !!msg);
}

function srcLink(l) {
  const t = l.title ? (l.title.length > 40 ? l.title.slice(0,40)+'…' : l.title) : 'source';
  return `<a href="${escHtml(l.link)}" target="_blank" rel="noopener noreferrer" class="src-link">${escHtml(t)}</a>`;
}

function dateMeta(date, source) {
  const parts = [];
  if (source) parts.push(`<span class="news-source">${escHtml(source)}</span>`);
  const d = formatDate(date);
  if (d) parts.push(`<span class="news-sep">·</span><span class="news-date">${escHtml(d)}</span>`);
  return parts.join('');
}

function renderInvestments(data) {
  const items = data.investments || [];
  if (!items.length) return `<div class="empty-state">No investment data found. Try refreshing.</div>`;

  const cards = items.map((inv, i) => {
    const isScraped = inv.source && inv.source !== 'analysis';
    const d = inv.date ? formatDate(inv.date) : (inv.date_hint || null);
    const href = inv.links?.[0]?.link || inv.link || '#';
    const tag = href !== '#' ? `a href="${escHtml(href)}" target="_blank" rel="noopener noreferrer"` : 'div';
    const closeTag = href !== '#' ? 'a' : 'div';
    return `
      <${tag} class="inv-card ${isScraped ? 'scraped' : ''} fade-up" style="animation-delay:${Math.min(i,20)*0.03}s">
        <div class="inv-top">
          <span class="inv-company">${escHtml(inv.company)}</span>
          ${inv.round  ? `<span class="inv-round">${escHtml(inv.round)}</span>` : ''}
          ${inv.amount ? `<span class="inv-amount">${escHtml(inv.amount)}</span>` : ''}
          ${inv.sector ? `<span class="inv-sector">${escHtml(inv.sector)}</span>` : ''}
        </div>
        ${inv.reason ? `<div class="inv-reason">${escHtml(inv.reason)}</div>` : ''}
        <div class="inv-footer">
          ${d ? `<span class="inv-date">${escHtml(d)}</span>` : ''}
          ${isScraped ? `<span class="inv-src-label">via ${escHtml(inv.source)}</span>` : ''}
        </div>
      </${closeTag}>`;
  }).join('');

  return `<div class="investments-list">${cards}</div>`;
}

function renderTrends(data) {
  const t = data.trends || {};
  const sections = [
    { key: 'hot_topics',   label: 'Investment Themes',         icon: '🔥', color: '#f97316', bg: 'rgba(249,115,22,0.1)'  },
    { key: 'sectors',      label: 'Sectors Getting Attention', icon: '🏗',  color: '#06b6d4', bg: 'rgba(6,182,212,0.1)'  },
    { key: 'technologies', label: 'Trends & Technologies',     icon: '⚡', color: '#8b5cf6', bg: 'rgba(139,92,246,0.1)' }
  ];

  const cols = sections.map(s => {
    // Only render items that have a valid source link
    const items = (t[s.key] || []).filter(item => (item.links || []).length > 0 && item.links[0]?.link);
    const cards = items.length
      ? items.map(item => {
          const link = item.links[0];
          const d    = formatDate(link.date);
          return `<a href="${escHtml(link.link)}" target="_blank" rel="noopener noreferrer" class="trend-card">
            <div class="trend-card-text">${escHtml(item.text)}</div>
            ${link.summary ? `<div class="trend-card-summary">${escHtml(link.summary.slice(0, 120))}</div>` : ''}
            <div class="trend-card-meta">
              ${link.source ? `<span class="trend-card-source" style="color:${s.color};opacity:0.8">${escHtml(link.source)}</span>` : ''}
              ${d ? `<span class="news-sep">·</span><span class="trend-card-date">${escHtml(d)}</span>` : ''}
            </div>
            <div class="trend-read">→ Read Article</div>
          </a>`;

      : `<div style="padding:0.75rem 1rem;font-size:0.75rem;color:var(--text-3)">No linked articles available</div>`;

}

function renderPartners(data) {
  if (data.missing_config || data.error?.includes('X_BEARER_TOKEN')) {
    return `<div class="apify-missing-config">
      <div class="apify-missing-config-icon">🔑</div>
      <div class="apify-missing-config-title">X API Bearer Token Required</div>
      <div class="apify-missing-config-sub">
        Add your X API Bearer Token to <span class="apify-key-example">.env</span> to enable live partner post analysis.<br><br>
        <span class="apify-key-example">X_BEARER_TOKEN=AAAAAAAAAAAAA…</span><br><br>
        Get a Bearer Token from <a href="https://developer.x.com" target="_blank" rel="noopener" style="color:var(--accent)">developer.x.com</a> — requires a free developer account.
      </div>
    </div>`;
  }

  const { insights, tweets = [] } = data;

  // ── AI Signal Analysis card ─────────────────────────────────────────────────
  const insightSections = [
    { key: 'market_sentiment',       label: 'Market Sentiment',        color: '#6366f1' },
    { key: 'conviction_signals',     label: 'Conviction Signals',      color: '#10b981' },
    { key: 'contrarian_takes',       label: 'Contrarian Takes',        color: '#f59e0b' },
    { key: 'forward_looking_bets',   label: 'Forward Looking Bets',    color: '#e879f9' },
    { key: 'deal_flow_opportunities',label: 'Deal Flow Opportunities',  color: '#06b6d4' }
  ];
  const insightCols = insightSections.map(s => {
    const rows = (insights?.[s.key] || []).length
      ? (insights[s.key]).slice(0, 3).map(i => `<li><span class="ins-bullet" style="background:${s.color}"></span>${escHtml(i)}</li>`).join('')
      : `<li style="color:var(--text-3);font-size:0.75rem">None detected</li>`;
    return `<div>
      <div class="insights-col-title" style="color:${s.color}">${escHtml(s.label)}</div>
      <ul class="insights-col-list">${rows}</ul>
    </div>`;
  }).join('');
  const insightsCard = insights ? `
    <div class="tweet-insights-card">
      <div class="tweet-insights-header">
        <div>
          <span class="tweet-insights-title">AI Signal Analysis</span>
          <div class="tweet-insights-subtitle">AI-generated investment signals from partner activity</div>
        </div>
        <span class="tweet-insights-badge">Powered by Claude Sonnet</span>
      </div>
      <div class="tweet-insights-grid">${insightCols}</div>
    </div>` : '';

  // ── Tweet feed ──────────────────────────────────────────────────────────────
  let feedHtml;
  if (data.firm === 'a16z') {
    feedHtml = tweets.length
      ? renderA16zTweetColumns(tweets)
      : `<div class="empty-state">No recent posts in the last 7 days.</div>`;
  } else if (data.firm === 'sequoia') {
    feedHtml = tweets.length
      ? renderSequoiaTweetColumns(tweets)
      : `<div class="empty-state">No recent posts in the last 7 days.</div>`;
  } else if (data.firm === 'yc') {
    feedHtml = tweets.length
      ? renderYCTweetColumns(tweets)
      : `<div class="empty-state">No recent posts in the last 7 days.</div>`;
  } else {
    const byHandle = {};
    tweets.forEach(t => { (byHandle[t.handle] = byHandle[t.handle] || []).push(t); });
    const groups = Object.entries(byHandle).map(([handle, htws]) => {
      const color = handleColor(handle);
      const top3  = htws.slice(0, 3);
      return `<div class="tweet-author-section fade-up">
        <div class="tweet-author-header">
          <span class="handle-badge" style="background:${color}20;color:${color};border:1px solid ${color}40">@${escHtml(handle)}</span>
          <span class="tweet-count-label">${top3.length} post${top3.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="tweet-cards">${top3.map(makeTweetCard).join('')}</div>
      </div>`;
    }).join('');
    feedHtml = tweets.length
      ? `<div class="tweet-feed">${groups}</div>`
      : `<div class="empty-state">No recent posts in the last 7 days.</div>`;
  }

  const xHeader = `<div style="display:flex;align-items:center;gap:0.625rem;margin-bottom:1.25rem;padding-bottom:0.875rem;border-bottom:1px solid var(--border)">
    <svg width="20" height="20" viewBox="0 0 1200 1227" fill="currentColor" style="flex-shrink:0"><path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z"/></svg>
    <span style="font-size:0.9375rem;font-weight:700;color:var(--text);letter-spacing:0.01em">X Activity</span>
  </div>`;

  const activeSubTab = state.xActivitySubTab || 'partners';
  const FIRM_X_LABEL = { a16z: 'a16z', yc: 'Y Combinator', sequoia: 'Sequoia' };
  const partnerLabel = (FIRM_X_LABEL[data.firm] || data.firm) + ' X Activity';
  const subtabBar = `<div class="x-subtab-bar">
    <button class="x-subtab${activeSubTab === 'insights'  ? ' active' : ''}" data-subtab="insights"  onclick="selectXActivitySubTab('insights')">AI Signal Analysis</button>
    <button class="x-subtab${activeSubTab === 'partners'  ? ' active' : ''}" data-subtab="partners"  onclick="selectXActivitySubTab('partners')">${partnerLabel}</button>
    <button class="x-subtab${activeSubTab === 'portfolio' ? ' active' : ''}" data-subtab="portfolio" onclick="selectXActivitySubTab('portfolio')">Portfolio X Activity</button>
  </div>`;

  const portfolioContent = state.portfolioTweetsCache[data.firm]
    ? renderPortfolioXActivity(state.portfolioTweetsCache[data.firm])
    : `<div class="x-portfolio-loading">Click "Portfolio X Activity" above to load CEO posts from X…</div>`;

  return xHeader + subtabBar +
    `<div class="x-subtab-panel${activeSubTab !== 'insights'  ? ' hidden' : ''}" data-subtab="insights">${insightsCard}</div>` +
    `<div class="x-subtab-panel${activeSubTab !== 'partners'  ? ' hidden' : ''}" data-subtab="partners">${feedHtml}</div>` +
    `<div class="x-subtab-panel${activeSubTab !== 'portfolio' ? ' hidden' : ''}" data-subtab="portfolio" id="x-subtab-portfolio">${portfolioContent}</div>` +
    `<div class="tweet-attribution">Powered by X API v2 · Original posts only</div>`;
}

function renderPortfolio(data) {
  const p = data.portfolio || data;
  const news           = p.news || [];
  const total_sources  = p.total_sources  || 0;
  const new_discovered = p.new_discovered || 0;

  const counter = `<div class="portfolio-counter">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Tracking ${total_sources} sources · ${new_discovered} new discovered
  </div>`;

  if (!news.length) {
    return counter + `<div class="empty-state">No portfolio company news detected in current articles.</div>`;
  }

  const cards = news.map((item, i) => {
    const d = formatDate(item.date);
    const tag = `<a ${item.link ? `href="${escHtml(item.link)}" target="_blank" rel="noopener noreferrer"` : ''} class="portfolio-news-card fade-up" style="animation-delay:${Math.min(i,20)*0.03}s">`;
    return `${tag}
      <div class="portfolio-company-badge">
        <div class="portfolio-co-name">${escHtml(item.company)}</div>
        ${item.sector ? `<span class="portfolio-co-sector">${escHtml(item.sector)}</span>` : ''}
        ${item.news_type ? `<div class="portfolio-news-type">${escHtml(item.news_type)}</div>` : ''}
      </div>
      <div class="portfolio-right">
        <div class="portfolio-headline">${escHtml(item.headline)}</div>
        ${item.summary ? `<div class="portfolio-summary">${escHtml(item.summary)}</div>` : ''}
        <div class="portfolio-item-meta">
          ${item.source ? `<span class="portfolio-source">${escHtml(item.source)}</span>` : ''}
          ${d ? `<span class="news-sep">·</span><span class="portfolio-date">${escHtml(d)}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');

  return counter + `<div class="portfolio-list">${cards}</div>`;
}

        </div>

        <div class="about-card-title">Media &amp; Publications</div>

          <li>a16z.com — firm blog and research</li>
          <li>The a16z Podcast (weekly)</li>
          <li>Various vertical newsletters (Fintech, Bio, Crypto)</li>

          <li>Future (futures thinking and analysis)</li>

    </div>`;
}

// ── Tab Loading ────────────────────────────────────────────────────────────────

async function loadTab(tabId, force = false) {
  const panel  = document.getElementById(`panel-${tabId}`);
  const tabDef = INNER_TABS.find(t => t.id === tabId);
  if (!panel) return;

  if (tabId === 'about') {
    const firm = state.firms.find(f => f.id === state.activeFirm);
    panel.innerHTML = panelHeader('about', `About ${firm?.name || state.activeFirm}`) + renderAboutForFirm(state.activeFirm);
    return;
  }

  if (!force && state.tabCache[tabId]) {
    renderTabFromCache(tabId);
    return;
  }

  state.tabLoading[tabId] = true;
  const spinnerLabel = tabId === 'partners'
    ? 'Fetching partner posts from X...'
    : tabId === 'overview'
    ? 'Building overview — analyzing all sources…'
    : `Loading ${tabDef.label}…`;
  panel.innerHTML = `${panelHeader(tabId, tabDef.label)}${spinner(spinnerLabel)}`;
  setTabRefreshSpinner(tabId, true);

  try {
    const url = `${tabDef.endpoint}?firm=${state.activeFirm}${force ? '&refresh=1' : ''}`;

    const res  = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();

    state.tabCache[tabId] = { data, timestamp: Date.now() };
    const itab = document.getElementById(`itab-${tabId}`);
    if (itab) itab.classList.add('loaded');
    renderTabFromCache(tabId);
  } catch (err) {
    panel.innerHTML = `${panelHeader(tabId, tabDef.label)}
      <div style="text-align:center;padding:3rem;color:#fca5a5;font-size:0.875rem;">Failed to load: ${escHtml(err.message)}</div>`;
  } finally {
    state.tabLoading[tabId] = false;
    setTabRefreshSpinner(tabId, false);
  }
}

function renderTabFromCache(tabId) {
  const panel  = document.getElementById(`panel-${tabId}`);
  const tabDef = INNER_TABS.find(t => t.id === tabId);
  const cached = state.tabCache[tabId];
  if (!panel || !cached) return;

  const renderers = {
    overview:    renderOverview,
    news:        renderFirmNews,
    investments: renderInvestments,
    trends:      renderTrends,
    partners:    renderPartners,
    portfolio:   renderPortfolio
  };
  const content = renderers[tabId] ? renderers[tabId](cached.data) : '';
  panel.innerHTML = panelHeader(tabId, tabDef.label) + content;
}

function setTabRefreshSpinner(tabId, on) {
  const btn = document.getElementById(`tab-refresh-${tabId}`);
  if (btn) btn.classList.toggle('spinning', on);
}

// ── Navigation ─────────────────────────────────────────────────────────────────

function showPanel(tabId) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const p = document.getElementById(`panel-${tabId}`);
  if (p) p.classList.add('active');
}

async function selectInnerTab(tabId) {
  if (state.tabLoading[tabId]) return;
  window.scrollTo(0, 0);
  state.activeInnerTab = tabId;
  renderInnerTabs();
  showPanel(tabId);
  await loadTab(tabId);
}

function selectXActivitySubTab(subTabId) {
  state.xActivitySubTab = subTabId;
  document.querySelectorAll('.x-subtab').forEach(b => {
    b.classList.toggle('active', b.dataset.subtab === subTabId);
  });
  document.querySelectorAll('.x-subtab-panel').forEach(p => {
    p.classList.toggle('hidden', p.dataset.subtab !== subTabId);
  });
  if (subTabId === 'portfolio' && !state.portfolioTweetsCache[state.activeFirm]) {
    loadPortfolioTweets(state.activeFirm);
  }
}

async function loadPortfolioTweets(firmId) {
  const panel = document.getElementById('x-subtab-portfolio');
  if (panel) panel.innerHTML = `<div class="x-portfolio-loading">Fetching portfolio CEO posts from X…</div>`;
  try {
    const res  = await fetch(`/api/portfolio-tweets?firm=${firmId}`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();
    state.portfolioTweetsCache[firmId] = data;
    if (panel) panel.innerHTML = renderPortfolioXActivity(data);
  } catch (err) {
    if (panel) panel.innerHTML = `<div class="empty-state">Failed to load portfolio posts: ${escHtml(err.message)}</div>`;
  }
}

async function selectFirm(firmId) {
  if (state.loading) return;
  window.scrollTo(0, 0);
  state.activeFirm       = firmId;
  state.activeInnerTab   = 'overview';
  state.tabCache         = {};
  state.xActivitySubTab  = 'partners';

  renderFirmTabs();
  renderInnerTabs();
  setError(null);

  const firm = state.firms.find(f => f.id === firmId);
  if (!firm) return;

  if (firm.coming_soon) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const csp = document.getElementById('comingSoonPanel');
    csp.style.display = 'block';
    csp.innerHTML = `<div class="coming-soon-panel">
      <div class="coming-soon-icon">🚧</div>
      <div class="coming-soon-title">${escHtml(firm.fullName)} — Coming Soon</div>
      <div class="coming-soon-sub">Data sources and AI analysis for ${escHtml(firm.fullName)} are in development.</div>
    </div>`;
    return;
  }

  document.getElementById('comingSoonPanel').style.display = 'none';
  showPanel('overview');
  await loadTab('overview');
}

// ── Refresh ────────────────────────────────────────────────────────────────────

async function refreshTab(tabId) {
  if (state.tabLoading[tabId]) return;
  delete state.tabCache[tabId];
  await loadTab(tabId, true);
  document.getElementById('lastRefresh').textContent = `Last updated ${nowStr()}`;
}

async function refreshActiveTab() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  setError(null);
  try {
    await refreshTab(state.activeInnerTab);
  } catch (err) {
    setError(err.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

async function refreshAll() {
  const btn = document.getElementById('refreshAllBtn');
  btn.disabled = true;
  btn.textContent = '…';
  setError(null);
  const tabs = INNER_TABS.filter(t => t.endpoint);
  for (const t of tabs) {
    delete state.tabCache[t.id];
    if (t.id === state.activeInnerTab) {
      await loadTab(t.id, true);
    } else {
      loadTab(t.id, true).catch(() => {});
      await new Promise(r => setTimeout(r, 400));
    }
  }
  document.getElementById('lastRefresh').textContent = `Last updated ${nowStr()}`;
  btn.disabled = false;
  btn.textContent = 'All';
  renderInnerTabs();
}

// ── Init ────────────────────────────────────────────────────────────────────────
async function init() {
  state.loading = true;
  const panel = document.getElementById('panel-overview');
  panel.classList.add('active');
  panel.innerHTML = spinner('Loading a16z intelligence…');

  try {
    const res = await fetch('/api/firms');
    if (!res.ok) throw new Error('Failed to load firms');
    state.firms = await res.json();
    renderFirmTabs();
    renderInnerTabs();
    showPanel('overview');
    await loadTab('overview');
    document.getElementById('lastRefresh').textContent = `Last updated ${nowStr()}`;
  } catch (err) {
    setError(err.message || 'Startup error — ensure server is running and ANTHROPIC_API_KEY is set.');
    panel.innerHTML = '';
  } finally {
    state.loading = false;
  }
}

init();
</script>
